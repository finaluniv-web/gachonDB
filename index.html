<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>가천대학교 체육학전공 실기 기록</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --primary:#004EA1;
  --primary-dark:#003B7A;
  --primary-light:#2980B9;
  --accent:#E8740C;
  --bg:#F4F7FA;
  --card:#fff;
  --text:#222;
  --sub:#666;
  --border:#E0E0E0;
  --foul:#e74c3c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:480px;margin:0 auto;padding:16px 12px 40px;}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;padding:28px 22px 22px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%;}
.hero-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.hero-logo{width:56px;height:56px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.hero-logo img{width:40px;height:40px;object-fit:contain;}
.hero-info .univ{font-size:18px;font-weight:800;}
.hero-info .dept{font-size:13px;opacity:.85;margin-top:2px;}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,.18);}
.badge-gender-m{background:rgba(54,162,235,.25);color:#d0e8ff;}
.badge-gender-f{background:rgba(255,99,132,.25);color:#ffd0da;}
.hero-score{background:rgba(255,255,255,.13);border-radius:14px;padding:16px;display:flex;justify-content:space-around;text-align:center;}
.hero-score .val{font-size:26px;font-weight:800;}
.hero-score .lbl{font-size:11px;opacity:.75;margin-top:2px;}

/* ── Cards ── */
.card{background:var(--card);border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);padding:20px;margin-bottom:14px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.official-banner{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px;position:relative;}
.official-banner .ob-label{font-size:12px;font-weight:600;opacity:.85;margin-bottom:8px;}
.official-banner .ob-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.official-banner .ob-item{background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;}
.official-banner .ob-val{font-size:20px;font-weight:800;}
.official-banner .ob-sub{font-size:11px;opacity:.8;margin-top:2px;}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;background:var(--card);color:var(--sub);box-shadow:0 1px 4px rgba(0,0,0,.06);transition:.2s;}
.tab-btn.active{background:var(--primary);color:#fff;}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── Progress ── */
.prog-row{margin-bottom:14px;}
.prog-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px;}
.prog-bar{height:10px;background:var(--border);border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;transition:width .6s;}

/* ── Table ── */
.rtable{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.rtable th{background:var(--primary);color:#fff;padding:8px 4px;white-space:nowrap;}
.rtable td{padding:7px 4px;text-align:center;border-bottom:1px solid var(--border);}
.rtable tr:hover td{background:#f0f6ff;}
.foul-tag{color:var(--foul);font-weight:700;}

/* ── Calc ── */
.calc-group{margin-bottom:14px;}
.calc-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;}
.calc-group input,.calc-group select{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:14px;}
.calc-result{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-radius:14px;padding:18px;text-align:center;margin-top:10px;}
.calc-result .cr-val{font-size:28px;font-weight:800;}
.calc-result .cr-lbl{font-size:12px;opacity:.8;margin-top:4px;}
.calc-sub{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
.calc-sub div{background:rgba(255,255,255,.12);border-radius:10px;padding:10px;text-align:center;}
.calc-sub .csv{font-size:18px;font-weight:700;}
.calc-sub .csl{font-size:11px;opacity:.75;margin-top:2px;}
.calc-score-lbl{font-size:12px;color:var(--primary);font-weight:600;margin-top:4px;min-height:18px;}

.empty-msg{text-align:center;padding:40px 0;color:var(--sub);font-size:15px;}
.gender-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
</style>
</head>
<body>
<div id="app"><p style="text-align:center;padding:60px 0;color:#999;">⏳ 데이터 불러오는 중...</p></div>

<script>
/* ================================================================
   가천대학교 체육학전공 – 실기 기록 관리 (F/f 파울 처리 포함)
   ================================================================ */

var SHEET_ID  = '1-uvH7koGGIEYXO8mL56xVUbUWXEbNPVuVP3htZ2wQMY';
var SHEET_TAB = '가천대학교체육학전공';
var CSV_URL   = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(SHEET_TAB);
var LOGO_SRC  = 'images/gachon.png';
var MULTI     = 1.75;

/* ── 배점표 (5점 단위 구간제) ── */
var STD = {
  strength: {
    '남': [[126,5],[131,10],[136,15],[141,20],[146,25],[151,30],[156,35],[161,40],[166,45],[171,50],[176,55],[181,60],[186,65],[191,70],[196,75],[201,80],[206,85],[211,90],[216,95],[221,100]],
    '여': [[66,5],[71,10],[76,15],[81,20],[86,25],[91,30],[96,35],[101,40],[106,45],[111,50],[116,55],[121,60],[126,65],[131,70],[136,75],[141,80],[146,85],[151,90],[156,95],[161,100]]
  },
  medicine: {
    '남': [[5.00,5],[5.50,10],[6.00,15],[6.50,20],[7.00,25],[7.50,30],[8.00,35],[8.50,40],[9.00,45],[9.50,50],[10.00,55],[10.50,60],[11.00,65],[11.50,70],[12.00,75],[12.50,80],[13.00,85],[13.50,90],[14.00,95],[14.50,100]],
    '여': [[4.00,5],[4.50,10],[5.00,15],[5.50,20],[6.00,25],[6.50,30],[7.00,35],[7.50,40],[8.00,45],[8.50,50],[9.00,55],[9.50,60],[10.00,65],[10.50,70],[11.00,75],[11.50,80],[12.00,85],[12.50,90],[13.00,95],[13.50,100]]
  },
  jump: {
    '남': [[220,5],[225,10],[230,15],[235,20],[240,25],[245,30],[250,35],[255,40],[260,45],[265,50],[270,55],[275,60],[280,65],[285,70],[290,75],[295,80],[300,85],[305,90],[310,95],[315,100]],
    '여': [[170,5],[175,10],[180,15],[185,20],[190,25],[195,30],[200,35],[205,40],[210,45],[215,50],[220,55],[225,60],[230,65],[235,70],[240,75],[245,80],[250,85],[255,90],[260,95],[265,100]]
  },
  run: {
    '남': [[10.50,5],[10.30,10],[10.10,15],[9.90,20],[9.70,25],[9.50,30],[9.30,35],[9.10,40],[8.90,45],[8.70,50],[8.50,55],[8.30,60],[8.10,65],[7.90,70],[7.70,75],[7.50,80],[7.30,85],[7.10,90],[6.90,95],[6.70,100]],
    '여': [[11.50,5],[11.30,10],[11.10,15],[10.90,20],[10.70,25],[10.50,30],[10.30,35],[10.10,40],[9.90,45],[9.70,50],[9.50,55],[9.30,60],[9.10,65],[8.90,70],[8.70,75],[8.50,80],[8.30,85],[8.10,90],[7.90,95],[7.70,100]]
  }
};

/* ── 유틸 ── */
function parseVal(raw){
  if(raw===null||raw===undefined) return {v:null,foul:false};
  var s=String(raw).trim();
  if(s==='') return {v:null,foul:false};
  if(s.toUpperCase()==='F') return {v:null,foul:true};
  var n=parseFloat(s);
  if(isNaN(n)) return {v:null,foul:false};
  return {v:n,foul:false};
}

function getScore(type,gender,raw){
  var p=parseVal(raw);
  if(p.foul) return {score:0,foul:true};
  if(p.v===null) return {score:0,foul:false};
  var tbl=STD[type][gender];
  if(!tbl) return {score:0,foul:false};
  var val=p.v, score=0;
  if(type==='run'){
    for(var i=0;i<tbl.length;i++){
      if(val<=tbl[i][0]) score=tbl[i][1];
    }
  } else {
    for(var i=0;i<tbl.length;i++){
      if(val>=tbl[i][0]) score=tbl[i][1];
    }
  }
  return {score:score,foul:false};
}

function fmtVal(v,foul){
  if(foul) return '<span class="foul-tag">FOUL</span>';
  if(v===null||v===undefined||v==='') return '-';
  return v;
}
function fmtScore(s,foul){
  if(foul) return '<span class="foul-tag">0</span>';
  return s;
}

/* ── CSV 파싱 ── */
function parseCSV(text){
  var lines=text.split('\n'), result=[];
  for(var i=0;i<lines.length;i++){
    var row=[], cur='', inQ=false;
    var line=lines[i];
    for(var j=0;j<line.length;j++){
      var c=line[j];
      if(inQ){
        if(c==='"'&&j+1<line.length&&line[j+1]==='"'){cur+='"';j++;}
        else if(c==='"') inQ=false;
        else cur+=c;
      } else {
        if(c==='"') inQ=true;
        else if(c===','){row.push(cur);cur='';}
        else cur+=c;
      }
    }
    row.push(cur);
    result.push(row);
  }
  return result;
}

/* ── 메인 ── */
function main(){
  var params=new URLSearchParams(window.location.search);
  var NAME=params.get('name');
  if(!NAME){document.getElementById('app').innerHTML='<p class="empty-msg">URL에 ?name=이름 을 추가해주세요.</p>';return;}

  fetch(CSV_URL).then(function(r){return r.text();}).then(function(txt){
    if(txt.indexOf('<!DOCTYPE')>=0||txt.indexOf('<html')>=0){
      document.getElementById('app').innerHTML='<p class="empty-msg">시트 데이터를 불러올 수 없습니다.</p>';return;
    }
    var rows=parseCSV(txt);
    if(rows.length<2){document.getElementById('app').innerHTML='<p class="empty-msg">데이터가 없습니다.</p>';return;}

    /* 헤더 인덱스 */
    var h=rows[0];
    var idx={};
    for(var i=0;i<h.length;i++){
      var hh=h[i].trim();
      if(hh==='구분') idx.type=i;
      else if(hh==='날짜') idx.date=i;
      else if(hh==='이름') idx.name=i;
      else if(hh==='성별') idx.gender=i;
      else if(hh==='학교') idx.school=i;
      else if(hh==='대학명') idx.univ=i;
      else if(hh==='학과명') idx.dept=i;
      else if(hh==='내신환산') idx.acad=i;
      else if(hh==='배근력') idx.str=i;
      else if(hh==='메디신볼') idx.med=i;
      else if(hh==='제자리멀리뛰기') idx.jmp=i;
      else if(hh.indexOf('왕복달리기')>=0) idx.run=i;
      else if(hh==='총점') idx.total=i;
    }

    /* 학생 필터 */
    var records=[], gender='남', school='', official=null, acad=0;
    for(var r=1;r<rows.length;r++){
      var c=rows[r];
      if(!c[idx.name]||c[idx.name].trim()!==NAME) continue;
      var tp=(c[idx.type]||'').trim();
      var dt=(c[idx.date]||'').trim();
      var g=(c[idx.gender]||'').trim();
      if(g) gender=g;
      if(c[idx.school]&&c[idx.school].trim()) school=c[idx.school].trim();

      var acadVal=parseFloat(c[idx.acad])||0;
      if(acadVal>0) acad=acadVal;

      var strP=parseVal(c[idx.str]);
      var medP=parseVal(c[idx.med]);
      var jmpP=parseVal(c[idx.jmp]);
      var runP=parseVal(c[idx.run]);

      var strR=getScore('strength',gender,c[idx.str]);
      var medR=getScore('medicine',gender,c[idx.med]);
      var jmpR=getScore('jump',gender,c[idx.jmp]);
      var runR=getScore('run',gender,c[idx.run]);

      var sumPrac=strR.score+medR.score+jmpR.score+runR.score;

      var rec={
        type:tp, date:dt, gender:gender,
        strRaw: strP.foul?'F':strP.v, strScore:strR.score, strFoul:strR.foul||strP.foul,
        medRaw: medP.foul?'F':medP.v, medScore:medR.score, medFoul:medR.foul||medP.foul,
        jmpRaw: jmpP.foul?'F':jmpP.v, jmpScore:jmpR.score, jmpFoul:jmpR.foul||jmpP.foul,
        runRaw: runP.foul?'F':runP.v, runScore:runR.score, runFoul:runR.foul||runP.foul,
        pracSum: sumPrac,
        pracConv: sumPrac*MULTI,
        total: acadVal>0 ? acadVal+sumPrac*MULTI : sumPrac*MULTI
      };
      records.push(rec);
      if(tp.indexOf('공식')>=0) official=rec;
    }

    if(records.length===0){
      document.getElementById('app').innerHTML='<p class="empty-msg">"'+NAME+'" 학생의 데이터를 찾을 수 없습니다.</p>';return;
    }

    /* 최신 기록 */
    var latest=official||records[0];
    if(acad===0 && official) acad=official.total-official.pracConv;

    render(NAME,gender,school,acad,records,latest,official);
  }).catch(function(e){
    document.getElementById('app').innerHTML='<p class="empty-msg">로드 실패: '+e.message+'</p>';
  });
}

/* ── 렌더링 ── */
var _calcInited=false;

function render(name,gender,school,acad,records,latest,official){
  var app=document.getElementById('app');
  app.innerHTML='';

  var gClass=gender==='여'?'badge-gender-f':'badge-gender-m';
  var gLabel=gender==='여'?'여학생':'남학생';
  var totalDisplay=latest.total.toFixed(2);

  /* Hero */
  var hero=document.createElement('div');
  hero.className='hero';
  hero.innerHTML=
    '<div class="hero-row">'+
      '<div class="hero-logo"><img src="'+LOGO_SRC+'" alt="가천대"></div>'+
      '<div class="hero-info"><div class="univ">가천대학교</div><div class="dept">체육학전공</div></div>'+
    '</div>'+
    '<div class="hero-meta">'+
      '<span class="badge '+gClass+'"><span class="gender-dot" style="background:'+(gender==='여'?'#FF6B9D':'#36A2EB')+'"></span>'+gLabel+'</span>'+
      '<span class="badge">'+name+'</span>'+
      (school?'<span class="badge">'+school+'</span>':'')+
    '</div>'+
    '<div class="hero-score">'+
      '<div><div class="val">'+totalDisplay+'</div><div class="lbl">예상 총점</div></div>'+
      '<div><div class="val">'+(acad||'-')+'</div><div class="lbl">내신환산</div></div>'+
      '<div><div class="val">'+latest.pracConv.toFixed(1)+'</div><div class="lbl">실기환산(×1.75)</div></div>'+
    '</div>';
  app.appendChild(hero);

  /* Official Banner */
  if(official){
    var ob=document.createElement('div');
    ob.className='official-banner';
    ob.innerHTML=
      '<div class="ob-label">📋 1차 공식테스트 ('+official.date+')</div>'+
      '<div class="ob-grid">'+
        '<div class="ob-item"><div class="ob-val">'+fmtVal(official.strRaw,official.strFoul)+'</div><div class="ob-sub">배근력'+(official.strFoul?'':' → '+official.strScore+'점')+'</div></div>'+
        '<div class="ob-item"><div class="ob-val">'+fmtVal(official.medRaw,official.medFoul)+'</div><div class="ob-sub">메디신볼'+(official.medFoul?'':' → '+official.medScore+'점')+'</div></div>'+
        '<div class="ob-item"><div class="ob-val">'+fmtVal(official.jmpRaw,official.jmpFoul)+'</div><div class="ob-sub">멀리뛰기'+(official.jmpFoul?'':' → '+official.jmpScore+'점')+'</div></div>'+
        '<div class="ob-item"><div class="ob-val">'+fmtVal(official.runRaw,official.runFoul)+'</div><div class="ob-sub">왕복달리기'+(official.runFoul?'':' → '+official.runScore+'점')+'</div></div>'+
      '</div>';
    app.appendChild(ob);
  }

  /* 종목별 현황 */
  var evCard=document.createElement('div');
  evCard.className='card';
  var events=[
    {key:'str',label:'배근력',raw:latest.strRaw,score:latest.strScore,foul:latest.strFoul,unit:'kg'},
    {key:'med',label:'메디신볼',raw:latest.medRaw,score:latest.medScore,foul:latest.medFoul,unit:'m'},
    {key:'jmp',label:'제자리멀리뛰기',raw:latest.jmpRaw,score:latest.jmpScore,foul:latest.jmpFoul,unit:'cm'},
    {key:'run',label:'10m왕복달리기',raw:latest.runRaw,score:latest.runScore,foul:latest.runFoul,unit:'초'}
  ];
  var evHtml='<div class="card-title"><img src="'+LOGO_SRC+'" width="20" height="20" style="border-radius:4px;"> 종목별 현황</div>';
  for(var i=0;i<events.length;i++){
    var e=events[i];
    var pct=e.foul?5:(e.score);
    var color=e.foul?'var(--foul)':'var(--primary)';
    var valTxt=e.foul?'FOUL':(e.raw!==null?e.raw+' '+e.unit:'-');
    var scoreTxt=e.foul?'0점':e.score+'점';
    evHtml+='<div class="prog-row">'+
      '<div class="prog-label"><span>'+e.label+'</span><span>'+valTxt+' → '+scoreTxt+'</span></div>'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+color+';"></div></div>'+
    '</div>';
  }
  evCard.innerHTML=evHtml;
  app.appendChild(evCard);

  /* Tabs */
  var tabWrap=document.createElement('div');
  tabWrap.className='tabs';
  tabWrap.innerHTML=
    '<button class="tab-btn active" data-tab="chart">📊 성장 차트</button>'+
    '<button class="tab-btn" data-tab="table">📋 기록표</button>'+
    '<button class="tab-btn" data-tab="calc">🧮 계산기</button>';
  app.appendChild(tabWrap);

  var chartCont=document.createElement('div');chartCont.id='tab-chart';chartCont.className='tab-content active';
  var tableCont=document.createElement('div');tableCont.id='tab-table';tableCont.className='tab-content';
  var calcCont=document.createElement('div');calcCont.id='tab-calc';calcCont.className='tab-content';
  app.appendChild(chartCont);
  app.appendChild(tableCont);
  app.appendChild(calcCont);

  /* 탭 전환 */
  var btns=tabWrap.querySelectorAll('.tab-btn');
  btns.forEach(function(b){
    b.addEventListener('click',function(){
      btns.forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});
      document.getElementById('tab-'+b.dataset.tab).classList.add('active');
    });
  });

  /* ── Chart Tab ── */
  renderChartTab(chartCont,records,gender);

  /* ── Table Tab ── */
  renderTableTab(tableCont,records);

  /* ── Calc Tab ── */
  renderCalcTab(calcCont,gender,acad);
}

/* ── Chart ── */
function renderChartTab(cont,records,gender){
  var reversed=records.slice().reverse();
  var labels=reversed.map(function(r){
    if(r.type.indexOf('공식')>=0) return '공식('+r.date+')';
    return r.date||'?';
  });
  var strData=reversed.map(function(r){return r.strFoul?0:r.strScore;});
  var medData=reversed.map(function(r){return r.medFoul?0:r.medScore;});
  var jmpData=reversed.map(function(r){return r.jmpFoul?0:r.jmpScore;});
  var runData=reversed.map(function(r){return r.runFoul?0:r.runScore;});

  var card=document.createElement('div');
  card.className='card';
  card.innerHTML='<div class="card-title">📊 환산점수 추이</div><canvas id="mainChart" height="220"></canvas>';
  cont.appendChild(card);

  var card2=document.createElement('div');
  card2.className='card';
  card2.innerHTML='<div class="card-title">📈 총점 추이</div><canvas id="totalChart" height="180"></canvas>';
  cont.appendChild(card2);

  setTimeout(function(){
    new Chart(document.getElementById('mainChart'),{
      type:'line',
      data:{
        labels:labels,
        datasets:[
          {label:'배근력',data:strData,borderColor:'#E74C3C',backgroundColor:'rgba(231,76,60,.1)',tension:.3,fill:false},
          {label:'메디신볼',data:medData,borderColor:'#3498DB',backgroundColor:'rgba(52,152,219,.1)',tension:.3,fill:false},
          {label:'멀리뛰기',data:jmpData,borderColor:'#2ECC71',backgroundColor:'rgba(46,204,113,.1)',tension:.3,fill:false},
          {label:'왕복달리기',data:runData,borderColor:'#F39C12',backgroundColor:'rgba(243,156,18,.1)',tension:.3,fill:false}
        ]
      },
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{y:{min:0,max:100,ticks:{stepSize:20}}}}
    });

    var totalData=reversed.map(function(r){return r.pracSum;});
    new Chart(document.getElementById('totalChart'),{
      type:'bar',
      data:{
        labels:labels,
        datasets:[{label:'실기 합계',data:totalData,backgroundColor:'rgba(0,78,161,.6)',borderRadius:6}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:400,ticks:{stepSize:100}}}}
    });
  },100);
}

/* ── Table ── */
function renderTableTab(cont,records){
  var card=document.createElement('div');
  card.className='card';
  var html='<div class="card-title">📋 전체 기록표</div>'+
    '<div style="overflow-x:auto;"><table class="rtable"><thead><tr>'+
    '<th>구분</th><th>날짜</th><th>배근력</th><th>환산</th><th>메디신</th><th>환산</th><th>멀리뛰기</th><th>환산</th><th>달리기</th><th>환산</th><th>실기합</th><th>환산×1.75</th>'+
    '</tr></thead><tbody>';
  for(var i=0;i<records.length;i++){
    var r=records[i];
    var rowClass=r.type.indexOf('공식')>=0?' style="background:#FFF8E1;font-weight:600;"':'';
    html+='<tr'+rowClass+'>'+
      '<td>'+r.type+'</td>'+
      '<td>'+r.date+'</td>'+
      '<td>'+fmtVal(r.strRaw,r.strFoul)+'</td><td>'+fmtScore(r.strScore,r.strFoul)+'</td>'+
      '<td>'+fmtVal(r.medRaw,r.medFoul)+'</td><td>'+fmtScore(r.medScore,r.medFoul)+'</td>'+
      '<td>'+fmtVal(r.jmpRaw,r.jmpFoul)+'</td><td>'+fmtScore(r.jmpScore,r.jmpFoul)+'</td>'+
      '<td>'+fmtVal(r.runRaw,r.runFoul)+'</td><td>'+fmtScore(r.runScore,r.runFoul)+'</td>'+
      '<td>'+r.pracSum+'</td>'+
      '<td>'+r.pracConv.toFixed(1)+'</td>'+
    '</tr>';
  }
  html+='</tbody></table></div>';
  card.innerHTML=html;
  cont.appendChild(card);
}

/* ── Calculator ── */
function renderCalcTab(cont,defaultGender,defaultAcad){
  var card=document.createElement('div');
  card.className='card';
  card.innerHTML=
    '<div class="card-title">🧮 점수 계산기</div>'+
    '<div class="calc-group"><label>성별</label><select id="calc-gender"><option value="남"'+(defaultGender==='남'?' selected':'')+'>남학생</option><option value="여"'+(defaultGender==='여'?' selected':'')+'>여학생</option></select></div>'+
    '<div class="calc-group"><label>내신환산 (최대 300)</label><input type="number" id="calc-acad" value="'+(defaultAcad||'')+'" placeholder="예: 300"></div>'+
    '<div class="calc-group"><label>배근력 (kg) – 파울 시 F 입력</label><input type="text" id="calc-str" placeholder="예: 180 또는 F"><div class="calc-score-lbl" id="calc-str-score"></div></div>'+
    '<div class="calc-group"><label>메디신볼 (m) – 파울 시 F 입력</label><input type="text" id="calc-med" placeholder="예: 9.5 또는 F"><div class="calc-score-lbl" id="calc-med-score"></div></div>'+
    '<div class="calc-group"><label>제자리멀리뛰기 (cm) – 파울 시 F 입력</label><input type="text" id="calc-jmp" placeholder="예: 290 또는 F"><div class="calc-score-lbl" id="calc-jmp-score"></div></div>'+
    '<div class="calc-group"><label>10m왕복달리기 (초) – 파울 시 F 입력</label><input type="text" id="calc-run" placeholder="예: 8.5 또는 F"><div class="calc-score-lbl" id="calc-run-score"></div></div>'+
    '<div class="calc-result">'+
      '<div class="cr-val" id="calc-total">-</div>'+
      '<div class="cr-lbl">예상 총점 (내신 + 실기×1.75)</div>'+
      '<div class="calc-sub">'+
        '<div><div class="csv" id="calc-prac-raw">-</div><div class="csl">실기 원점수 (400)</div></div>'+
        '<div><div class="csv" id="calc-prac-conv">-</div><div class="csl">실기 환산 (700)</div></div>'+
      '</div>'+
    '</div>';
  cont.appendChild(card);

  _calcInited=true;

  var ids=['calc-gender','calc-acad','calc-str','calc-med','calc-jmp','calc-run'];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener('input',updateCalc);
    if(el) el.addEventListener('change',updateCalc);
  });
}

function updateCalc(){
  if(!_calcInited) return;
  var genderEl=document.getElementById('calc-gender');
  var acadEl=document.getElementById('calc-acad');
  if(!genderEl||!acadEl) return;

  var gender=genderEl.value;
  var acad=parseFloat(acadEl.value)||0;

  var evts=[
    {type:'strength',id:'calc-str',lbl:'calc-str-score'},
    {type:'medicine',id:'calc-med',lbl:'calc-med-score'},
    {type:'jump',id:'calc-jmp',lbl:'calc-jmp-score'},
    {type:'run',id:'calc-run',lbl:'calc-run-score'}
  ];

  var sumRaw=0;
  for(var i=0;i<evts.length;i++){
    var el=document.getElementById(evts[i].id);
    var lblEl=document.getElementById(evts[i].lbl);
    if(!el) continue;
    var raw=el.value.trim();
    if(raw===''){
      if(lblEl) lblEl.innerHTML='종목 기록을 입력해주세요';
      continue;
    }
    var res=getScore(evts[i].type,gender,raw);
    if(raw.toUpperCase()==='F'){
      if(lblEl) lblEl.innerHTML='<span style="color:var(--foul);font-weight:700;">FOUL → 0점</span>';
    } else {
      if(lblEl) lblEl.innerHTML='환산: <strong>'+res.score+'점</strong>';
    }
    sumRaw+=res.score;
  }

  var conv=sumRaw*MULTI;
  var total=acad+conv;

  var totalEl=document.getElementById('calc-total');
  var pracRawEl=document.getElementById('calc-prac-raw');
  var pracConvEl=document.getElementById('calc-prac-conv');

  if(totalEl) totalEl.textContent=total.toFixed(2)+'점';
  if(pracRawEl) pracRawEl.textContent=sumRaw+' / 400';
  if(pracConvEl) pracConvEl.textContent=conv.toFixed(1)+' / 700';
}

/* ── 시작 ── */
main();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>가천대 체육학전공 실기 기록</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--primary:#004EA1;--primary-dark:#003B7A;--primary-light:#2980B9;
--primary-bg:rgba(0,78,161,.08);--accent:#E8740C;--accent-light:#F39C12;
--bg:#F2F6FB;--card:#fff;--text:#1A2332;--sub:#6B7D94;--border:#D4E0F0;
--foul:#e74c3c;--foul-bg:rgba(231,76,60,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:0 0 40px;max-width:640px;margin:0 auto;}
.loading,.error{text-align:center;padding:60px 20px;font-size:1.1rem;color:var(--sub);}
.error{color:#c0392b;}
.hero{background:linear-gradient(135deg,#004EA1 0%,#2980B9 50%,#003B7A 100%);color:#fff;padding:28px 22px 24px;border-radius:0 0 28px 28px;box-shadow:0 6px 24px rgba(0,78,161,.3);margin-bottom:14px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06);}
.hero::after{content:'';position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;position:relative;z-index:1;}
.hero-logo{width:54px;height:54px;object-fit:contain;border-radius:12px;background:rgba(255,255,255,.95);padding:4px;flex-shrink:0;}
.hero-info h1{font-size:1.25rem;font-weight:800;margin-bottom:2px;}
.hero-info p{font-size:.8rem;opacity:.88;}
.hero-info .cnt{font-size:.78rem;opacity:.75;margin-top:2px;}
.gender-badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.7rem;font-weight:700;margin-left:6px;vertical-align:middle;}
.gender-m{background:rgba(255,255,255,.25);color:#fff;}
.gender-f{background:rgba(255,200,200,.35);color:#fff;}
.hero-divider{height:1px;background:rgba(255,255,255,.2);margin:0 0 16px;position:relative;z-index:1;}
.hero-score-area{text-align:center;position:relative;z-index:1;}
.hero-label{font-size:.78rem;opacity:.8;margin-bottom:4px;letter-spacing:.5px;}
.hero-score{font-size:2.8rem;font-weight:900;letter-spacing:-1px;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.15);}
.hero-detail{font-size:.72rem;opacity:.78;line-height:1.7;}
.hero-acad{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 14px;background:rgba(255,255,255,.18);border-radius:20px;font-size:.78rem;font-weight:600;}
.hero-formula{font-size:.68rem;opacity:.6;margin-top:4px;}
.official-card{background:var(--card);border-radius:16px;margin:0 16px 14px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);overflow:hidden;}
.official-card-header{background:linear-gradient(135deg,#EAF1FB,#D4E4F8);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.oc-title{font-size:.92rem;font-weight:800;color:var(--primary-dark);}
.oc-date{font-size:.75rem;color:var(--sub);font-weight:500;}
.oc-trophy{font-size:1.2rem;margin-right:8px;}
.official-body{padding:16px 14px 12px;}
.official-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.og-item{background:linear-gradient(135deg,#F5F8FD,#EAF0FA);border-radius:12px;padding:14px 12px;text-align:center;border:1px solid #D4E0F0;position:relative;overflow:hidden;}
.og-item.foul-item{background:linear-gradient(135deg,#FFF5F5,#FEE);border:1px solid #F5C6CB;}
.og-item::after{content:'';position:absolute;top:0;right:0;width:30px;height:30px;background:var(--primary);opacity:.05;border-radius:0 0 0 30px;}
.og-item.foul-item::after{background:var(--foul);}
.og-icon{margin-bottom:6px;}
.og-icon img{width:28px;height:28px;object-fit:contain;}
.og-label{font-size:.7rem;color:var(--sub);font-weight:600;margin-bottom:4px;letter-spacing:.3px;}
.og-value{font-size:1.3rem;font-weight:800;color:var(--text);line-height:1;}
.og-value.foul-val{color:var(--foul);}
.og-unit{font-size:.7rem;color:var(--sub);font-weight:400;margin-left:2px;}
.og-score{display:inline-block;margin-top:6px;padding:2px 10px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-radius:10px;font-size:.68rem;font-weight:700;}
.og-score.foul-score{background:linear-gradient(135deg,var(--foul),#c0392b);}
.official-total-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:#EAF1FB;border-radius:10px;border:1px dashed var(--primary-light);}
.official-total-label{font-size:.78rem;color:var(--sub);font-weight:600;}
.official-total-val{font-size:1.2rem;font-weight:900;color:var(--primary-dark);}
.tabs{display:flex;gap:6px;margin:0 16px 14px;}
.tab-btn{flex:1;padding:10px 0;border:2px solid var(--primary);border-radius:12px;background:transparent;color:var(--primary);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap;}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(0,78,161,.3);}
.content-area{padding:0 16px;}
.event-card{background:var(--card);border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden;border:1px solid var(--border);}
.event-header{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);transition:background .15s;}
.event-header:active{background:var(--primary-bg);}
.ev-title-wrap{display:flex;align-items:center;gap:10px;}
.ev-logo{width:24px;height:24px;object-fit:contain;flex-shrink:0;}
.event-title{font-size:.95rem;font-weight:700;color:var(--text);}
.event-title small{color:var(--sub);font-weight:400;}
.event-badge{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-radius:20px;padding:4px 13px;font-size:.78rem;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,78,161,.25);}
.event-badge.foul-badge{background:linear-gradient(135deg,var(--foul),#c0392b);box-shadow:0 2px 6px rgba(231,76,60,.25);}
.event-body{padding:14px 18px;}
.chart-type-btns{display:flex;gap:6px;margin-bottom:10px;}
.chart-type-btn{padding:5px 14px;border:1.5px solid var(--primary);border-radius:8px;background:transparent;color:var(--primary);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;}
.chart-type-btn.active{background:var(--primary);color:#fff;}
.chart-wrap{position:relative;width:100%;height:240px;margin-bottom:12px;}
.progress-wrap{margin-top:10px;}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.78rem;}
.progress-date{width:80px;color:var(--sub);white-space:nowrap;flex-shrink:0;font-size:.73rem;}
.progress-bar-outer{flex:1;background:#DCE8F5;border-radius:10px;height:10px;overflow:hidden;}
.progress-bar-inner{height:100%;border-radius:10px;transition:width .6s ease;background:linear-gradient(90deg,var(--primary),var(--primary-light));}
.progress-bar-inner.official-bar{background:linear-gradient(90deg,var(--primary-dark),var(--primary));}
.progress-bar-inner.foul-bar{background:linear-gradient(90deg,var(--foul),#c0392b);}
.progress-val{width:60px;text-align:right;font-weight:700;color:var(--primary);flex-shrink:0;}
.progress-val.foul-val{color:var(--foul);}
.detail-toggle{font-size:.76rem;color:var(--primary);cursor:pointer;text-align:center;padding:8px;border-top:1px solid var(--border);margin-top:8px;font-weight:600;}
.detail-table{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:6px;}
.detail-table th{background:#EAF1FB;padding:6px 8px;text-align:center;color:var(--sub);font-weight:600;}
.detail-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border);}
.detail-table tr.official td{background:#EAF1FB;font-weight:700;color:var(--primary-dark);}
.detail-table tr.foul-row td{background:var(--foul-bg);color:var(--foul);}
.record-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.record-table{width:100%;border-collapse:collapse;font-size:.74rem;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.record-table th{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:9px 6px;text-align:center;white-space:nowrap;font-weight:600;}
.record-table td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
.record-table tr.official td{background:#EAF1FB;font-weight:700;color:var(--primary-dark);}
.missing{color:#ccc;font-style:italic;font-size:.72rem;}
.foul-tag{color:var(--foul);font-weight:800;font-size:.78rem;}
.calc-card{background:var(--card);border-radius:16px;margin:0 0 14px;padding:20px 18px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);}
.calc-title{font-size:1rem;font-weight:800;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.calc-title img{width:24px;height:24px;object-fit:contain;}
.calc-gender{display:flex;gap:8px;margin-bottom:16px;}
.calc-gender button{flex:1;padding:8px;border:2px solid var(--primary);border-radius:10px;background:transparent;color:var(--primary);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;}
.calc-gender button.active{background:var(--primary);color:#fff;}
.calc-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:#F5F8FD;border-radius:10px;border:1px solid #D4E0F0;}
.calc-row label{font-size:.8rem;font-weight:700;color:var(--text);min-width:72px;}
.calc-row input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;text-align:center;outline:none;transition:border-color .2s;max-width:120px;font-weight:600;}
.calc-row input:focus{border-color:var(--primary);}
.calc-row input.foul-input{border-color:var(--foul);background:var(--foul-bg);color:var(--foul);}
.calc-row .calc-score{font-size:.82rem;font-weight:800;color:var(--primary);min-width:60px;text-align:right;}
.calc-row .calc-score.foul-sc{color:var(--foul);}
.calc-row .calc-unit{font-size:.72rem;color:var(--sub);min-width:24px;}
.calc-result{margin-top:16px;padding:16px;background:linear-gradient(135deg,#EAF1FB,#D4E4F8);border-radius:12px;text-align:center;border:1px dashed var(--primary-light);}
.calc-result-label{font-size:.78rem;color:var(--sub);font-weight:600;margin-bottom:4px;}
.calc-result-score{font-size:2rem;font-weight:900;color:var(--primary-dark);}
.calc-result-detail{font-size:.72rem;color:var(--sub);margin-top:6px;}
.calc-reset{display:block;margin:12px auto 0;padding:8px 24px;border:1.5px solid var(--primary);border-radius:8px;background:transparent;color:var(--primary);font-weight:700;font-size:.8rem;cursor:pointer;transition:all .15s;}
.calc-reset:active{background:var(--primary);color:#fff;}
.calc-ref{margin-top:14px;padding:12px;background:#F0F5FC;border-radius:10px;font-size:.72rem;color:var(--sub);line-height:1.7;overflow-x:auto;}
.calc-ref strong{color:var(--text);}
.calc-ref-table{width:100%;border-collapse:collapse;margin-top:6px;margin-bottom:14px;font-size:.68rem;}
.calc-ref-table th{background:#DAE6F5;padding:3px 5px;text-align:center;color:var(--sub);font-weight:600;white-space:nowrap;}
.calc-ref-table td{padding:3px 5px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
.calc-foul-hint{font-size:.7rem;color:var(--sub);margin-bottom:12px;padding:8px 12px;background:#FFF8E1;border-radius:8px;border:1px solid #F0E0A0;}
/* ── 영상 탭 ── */
.video-timeline{position:relative;padding-left:22px;}
.video-timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border);}
.video-item{position:relative;margin-bottom:20px;}
.video-item::before{content:'';position:absolute;left:-17px;top:16px;width:12px;height:12px;background:var(--primary);border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px var(--primary);}
.video-item.official::before{background:#f39c12;box-shadow:0 0 0 2px #f39c12;}
.video-card{background:var(--card);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);overflow:hidden;}
.video-meta{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;background:#EAF1FB;border-bottom:1px solid var(--border);}
.video-date-badge{font-size:.8rem;font-weight:700;color:var(--primary-dark);}
.video-type-badge{font-size:.72rem;background:#D4E4F8;color:var(--primary-dark);border-radius:12px;padding:3px 10px;font-weight:600;}
.video-item.official .video-meta{background:#EAF1FB;}
.video-item.official .video-type-badge{background:#FFE8A0;color:#7d4e00;}
.video-heart{font-size:1.3rem;cursor:pointer;user-select:none;transition:transform .15s;line-height:1;}
.video-heart:active{transform:scale(1.35);}
.video-fav-label{font-size:.7rem;color:#e74c3c;text-align:right;padding:4px 14px;font-weight:700;background:#fff5f5;}
.video-thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;cursor:pointer;}
.video-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}
.video-thumb-wrap:active img{opacity:.85;}
.video-thumb-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.28);}
.video-play-btn{width:60px;height:60px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);margin-bottom:8px;}
.video-play-btn svg{width:26px;height:26px;fill:var(--primary-dark);margin-left:4px;}
.video-open-label{color:#fff;font-size:.78rem;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5);letter-spacing:.3px;}
.video-portrait-wrap{width:100%;background:#000;display:flex;justify-content:center;align-items:center;cursor:pointer;position:relative;overflow:hidden;min-height:300px;}
.video-portrait-wrap:active{opacity:.88;}
.video-portrait-inner{height:320px;aspect-ratio:9/16;background:#111;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.video-portrait-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.35);}
.video-portrait-side{flex:1;background:#000;}
.video-drive-thumb{width:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;padding:32px 0;}
.video-drive-thumb:active{opacity:.85;}
.video-drive-icon{font-size:3rem;margin-bottom:10px;}
.video-drive-label{color:#fff;font-size:.85rem;font-weight:700;margin-bottom:4px;}
.video-drive-sub{color:rgba(255,255,255,.6);font-size:.73rem;}
.fav-section{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);}
.fav-title{font-size:.88rem;font-weight:800;color:var(--primary-dark);margin-bottom:10px;}
.fav-empty{font-size:.8rem;color:var(--sub);text-align:center;padding:8px 0;}
.fav-mini-item{font-size:.8rem;padding:5px 0;color:var(--primary-dark);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.fav-mini-item:last-child{border-bottom:none;}
.video-empty{text-align:center;padding:48px 20px;color:var(--sub);font-size:.9rem;background:var(--card);border-radius:14px;border:1px solid var(--border);}
</style>
</head>

function getScore(table,val){
  if(val===null||val===undefined)return null;
  for(var i=0;i<table.length;i++){if(val>=table[i].min&&val<=table[i].max)return table[i].s;}
  return 0;
}

var EVENTS=[
  {key:'strength',scoreKey:'strScore',foulKey:'strFoul',label:'배근력',unit:'kg',lowerBetter:false},
  {key:'medicine',scoreKey:'medScore',foulKey:'medFoul',label:'메디신볼',unit:'m',lowerBetter:false},
  {key:'jump',scoreKey:'jumpScore',foulKey:'jumpFoul',label:'제자리멀리뛰기',unit:'cm',lowerBetter:false},
  {key:'run',scoreKey:'runScore',foulKey:'runFoul',label:'10m왕복달리기',unit:'초',lowerBetter:true}
];

function pv(v){
  if(v===undefined||v===null)return{val:null,foul:false};
  var s=String(v).replace(/,/g,'').trim();
  if(s==='')return{val:null,foul:false};
  if(s.toUpperCase()==='F')return{val:null,foul:true};
  var n=parseFloat(s);
  return isNaN(n)?{val:null,foul:false}:{val:n,foul:false};
}
function isOfficial(t){return(t||'').indexOf('공식')!==-1;}
function normalizeDate(d){
  if(!d)return'00000000';
  if(d.indexOf('.')!==-1)return d.replace(/\./g,'').padEnd(8,'0');
  var m=d.match(/^(\d{2})-(\d{2})$/);
  if(m)return String(2000+parseInt(m[1]))+m[2]+'00';
  return d.replace(/\D/g,'').padEnd(8,'0');
}
function fmt(v){return v!==null?(typeof v==='number'?v.toFixed(2):String(v)):'—';}
function descSort(arr){return arr.slice().sort(function(a,b){var da=normalizeDate(a.date),db=normalizeDate(b.date);return da>db?-1:da<db?1:0;});}

function parseCSV(text){
  var rows=[],lines=text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){
    var line=lines[i];if(!line.trim())continue;
    var row=[],cell='',inQ=false;
    for(var j=0;j<line.length;j++){var c=line[j];if(inQ){if(c==='"'){if(line[j+1]==='"'){cell+='"';j++;}else inQ=false;}else cell+=c;}else{if(c==='"')inQ=true;else if(c===','){row.push(cell);cell='';}else cell+=c;}}
    row.push(cell);rows.push(row);
  }
  return rows;
}

function parseStudent(name,rows){
  var records=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<9)continue;
    if((r[2]||'').trim()!==name)continue;
    var gRaw=(r[3]||'').trim();
    var gKey=(gRaw==='여'||gRaw==='여자')?'여':'남';
    var tbl=STD[gKey];
    var acadParsed=pv(r[7]);
    var acadVal=acadParsed.val;
    var strP=pv(r[8]),medP=pv(r[9]),jmpP=pv(r[10]),runP=pv(r[11]);
    var strScore=strP.foul?0:getScore(tbl.strength,strP.val);
    var medScore=medP.foul?0:getScore(tbl.medicine,medP.val);
    var jumpScore=jmpP.foul?0:getScore(tbl.jump,jmpP.val);
    var runScore=runP.foul?0:getScore(tbl.run,runP.val);
    var totVal=pv(r[12]).val;
    var total=totVal;
    var scores=[strScore,medScore,jumpScore,runScore];
    var allHave=scores.every(function(v){return v!==null;});
    if(total===null&&allHave){
      var sum=scores.reduce(function(a,b){return a+b;},0);
      total=Math.round(((acadVal||0)+sum*1.75)*100)/100;
    }
    records.push({
      type:(r[0]||'').trim(),date:(r[1]||'').trim(),
      name:(r[2]||'').trim(),gender:gKey,
      school:(r[4]||'').trim(),univ:(r[5]||'').trim(),dept:(r[6]||'').trim(),
      acad:acadVal,
      strength:strP.val,strScore:strScore,strFoul:strP.foul,
      medicine:medP.val,medScore:medScore,medFoul:medP.foul,
      jump:jmpP.val,jumpScore:jumpScore,jumpFoul:jmpP.foul,
      run:runP.val,runScore:runScore,runFoul:runP.foul,
      total:total
    });
  }
  records.sort(function(a,b){return normalizeDate(a.date)<normalizeDate(b.date)?-1:1;});
  return records;
}

function parseVideos(name,univName,rows){
  var videos=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<7)continue;
    if((r[2]||'').trim()!==name)continue;
    if(univName&&(r[0]||'').trim()!==univName)continue;
    var url=(r[6]||'').trim();if(!url)continue;
    videos.push({univ:(r[0]||'').trim(),dept:(r[1]||'').trim(),name:(r[2]||'').trim(),
      school:(r[3]||'').trim(),date:(r[4]||'').trim(),type:(r[5]||'').trim(),url:url});
  }
  videos.sort(function(a,b){return normalizeDate(a.date)<normalizeDate(b.date)?-1:1;});
  return videos;
}

function getVideoType(url){
  if(!url)return null;
  var yt=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if(yt)return{type:'youtube',id:yt[1]};
  var dr=url.match(/\/file\/d\/([^\/\?]+)/);
  if(dr)return{type:'drive',id:dr[1]};
  return{type:'other',id:null};
}
function getYtThumb(id){return'https://img.youtube.com/vi/'+id+'/maxresdefault.jpg';}

function fmtCell(val,foul,unit){
  if(foul)return'<span class="foul-tag">FOUL</span>';

  return val+(unit?' '+unit:'');
}
function fmtScoreCell(sc,foul){
  if(foul)return'<span class="foul-tag">0</span>';
  if(sc===null||sc===undefined)return'<span class="missing">—</span>';
  return sc;
}

function renderChartTab(records,el){
  el.innerHTML='';

    var lastRec=withScore.length?withScore[withScore.length-1]:null;
    var badge,badgeClass;
    if(lastRec&&lastRec[ev.foulKey]){badge='FOUL';badgeClass='event-badge foul-badge';}
    else{badge=lastRec?lastRec[ev.scoreKey]+'점':'—';badgeClass='event-badge';}

    card.innerHTML=
      '<div class="event-header" onclick="toggleCard(\''+ev.key+'\')">'+

      '<span class="event-title">'+ev.label+' <small>('+ev.unit+')</small></span></div>'+
      '<span class="'+badgeClass+'">'+badge+'</span></div>'+

      '<div id="detail-'+ev.key+'" style="display:none;"></div></div>';
    el.appendChild(card);
    setTimeout(function(){buildChart(ev,records,'line');},60);
    buildProgress(ev,records);buildDetailTable(ev,records);
  });

function buildChart(ev,records,type){
  var canvas=document.getElementById('chart-'+ev.key);if(!canvas)return;
  if(_charts[ev.key]){_charts[ev.key].destroy();delete _charts[ev.key];}
  var labels=records.map(function(r){return r.date||'(없음)';});
  var rawData=records.map(function(r){if(r[ev.foulKey])return null;return r[ev.key];});
  var pointColors=records.map(function(r){if(r[ev.foulKey])return'#e74c3c';return isOfficial(r.type)?'#003B7A':'#004EA1';});
  var pointSizes=records.map(function(r){return isOfficial(r.type)?8:5;});
  var ds;
  if(type==='bar'){
    ds=[{label:ev.label,data:rawData,backgroundColor:records.map(function(r){if(r[ev.foulKey])return'rgba(231,76,60,.5)';return isOfficial(r.type)?'rgba(0,59,122,.7)':'rgba(0,78,161,.45)';}),borderColor:pointColors,borderWidth:2,borderRadius:6}];
  }else{
    ds=[{label:ev.label,data:rawData,borderColor:'#004EA1',backgroundColor:'rgba(0,78,161,.08)',tension:.35,pointRadius:pointSizes,pointBackgroundColor:pointColors,pointBorderColor:pointColors,pointBorderWidth:2,fill:true,borderWidth:3}];
  }
  _charts[ev.key]=new Chart(canvas,{type:type,data:{labels:labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},scales:{x:{grid:{display:false}},y:{beginAtZero:false,title:{display:true,text:ev.unit}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){var idx=ctx.dataIndex;var r=window._RECORDS[idx];var val=ctx.parsed.y;var sc=r?r[ev.scoreKey]:null;var foul=r?r[ev.foulKey]:false;var line=ev.label+': ';if(foul)line+='FOUL (0점)';else{line+=(val!==null?val+' '+ev.unit:'미측정');if(sc!==null)line+=' (환산 '+sc+'점)';}if(r&&isOfficial(r.type))line+=' ⭐공식';return line;}}}}}});
}
function buildProgress(ev,records){
  var el=document.getElementById('prog-'+ev.key);if(!el)return;
  var vals=records.map(function(r){if(r[ev.foulKey])return null;return r[ev.key];}).filter(function(v){return v!==null;});
  if(!vals.length){el.innerHTML='';return;}
  var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals);
  el.innerHTML=records.map(function(r){
    var foul=r[ev.foulKey];
    if(r[ev.key]===null&&!foul)return'';
    var pct=foul?3:(ev.lowerBetter?(max===min?100:Math.round((1-(r[ev.key]-min)/(max-min))*100)):(max===0?0:Math.round(r[ev.key]/max*100)));
    var isOff=isOfficial(r.type);
    var bold=isOff?'font-weight:700;color:var(--primary-dark)':'';
    var barClass=foul?'progress-bar-inner foul-bar':(isOff?'progress-bar-inner official-bar':'progress-bar-inner');
    var tag=isOff?' ⭐':'';
    var valText=foul?'FOUL':r[ev.key];
    var valClass=foul?'progress-val foul-val':'progress-val';
    return'<div class="progress-row"><span class="progress-date" style="'+bold+'">'+r.date+tag+'</span>'+
      '<div class="progress-bar-outer"><div class="'+barClass+'" style="width:'+pct+'%"></div></div>'+
      '<span class="'+valClass+'">'+valText+'</span></div>';
  }).join('');
}

}
function switchChartType(key,type,e){

    '<div class="calc-foul-hint">💡 파울(F)은 0점으로 처리됩니다</div>'+
    '<div class="calc-gender"><button id="calc-g-f" class="'+(_calcGender==='여'?'active':'')+'" onclick="setCalcGender(\'여\')">여자</button>'+
    '<button id="calc-g-m" class="'+(_calcGender==='남'?'active':'')+'" onclick="setCalcGender(\'남\')">남자</button></div>'+
    '<div class="calc-row"><label>내신환산</label><input type="number" id="calc-acad" value="'+da+'" step="0.01" oninput="updateCalc()"><span class="calc-unit">점</span><span class="calc-score" id="calc-acad-sc"></span></div>'+
    '<div class="calc-row"><label>배근력</label><input type="number" id="calc-str" step="0.5" placeholder="kg" oninput="updateCalc()"><span class="calc-unit">kg</span><span class="calc-score" id="calc-str-sc"></span></div>'+
    '<div class="calc-row"><label>메디신볼</label><input type="number" id="calc-med" step="0.1" placeholder="m" oninput="updateCalc()"><span class="calc-unit">m</span><span class="calc-score" id="calc-med-sc"></span></div>'+
    '<div class="calc-row"><label>멀리뛰기</label><input type="number" id="calc-jump" step="1" placeholder="cm" oninput="updateCalc()"><span class="calc-unit">cm</span><span class="calc-score" id="calc-jump-sc"></span></div>'+
    '<div class="calc-row"><label>달리기</label><input type="number" id="calc-run" step="0.01" placeholder="초" oninput="updateCalc()"><span class="calc-unit">초</span><span class="calc-score" id="calc-run-sc"></span></div>'+
    '<div class="calc-result"><div class="calc-result-label">예상 최종 총점</div>'+
    '<div class="calc-result-score" id="calc-total">—</div>'+
    '<div class="calc-result-detail" id="calc-detail">종목 기록을 입력해주세요</div></div>'+
    '<button class="calc-reset" onclick="resetCalc()">초기화</button>'+
    '<div class="calc-ref" id="calc-ref"></div></div>';
  _calcInited=true;updateCalcRef();
}
function setCalcGender(g){_calcGender=g;var m=document.getElementById('calc-g-m'),f=document.getElementById('calc-g-f');if(m)m.classList.toggle('active',g==='남');if(f)f.classList.toggle('active',g==='여');updateCalcRef();updateCalc();}
function updateCalcRef(){
  var tbl=STD[_calcGender];var el=document.getElementById('calc-ref');if(!el||!tbl)return;
  function refRow(arr){
    var rows='';
    for(var i=0;i<arr.length;i+=4){
      var slice=arr.slice(i,i+4);
      rows+='<tr>'+slice.map(function(x){return'<td>'+x.min+(x.max<99999?'~'+x.max:'↑')+'</td><td><strong>'+x.s+'</strong></td>';}).join('')+'</tr>';
    }
    return rows;
  }
  el.innerHTML='<strong>'+_calcGender+'자 환산 기준표 (5점 단위)</strong>'+
    '<br><br>배근력(kg)<table class="calc-ref-table"><thead><tr><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th></tr></thead><tbody>'+refRow(tbl.strength)+'</tbody></table>'+
    '메디신볼(m)<table class="calc-ref-table"><thead><tr><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th></tr></thead><tbody>'+refRow(tbl.medicine)+'</tbody></table>'+
    '제자리멀리뛰기(cm)<table class="calc-ref-table"><thead><tr><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th></tr></thead><tbody>'+refRow(tbl.jump)+'</tbody></table>'+
    '10m왕복달리기(초, 낮을수록 좋음)<table class="calc-ref-table"><thead><tr><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th><th>범위</th><th>점수</th></tr></thead><tbody>'+refRow(tbl.run)+'</tbody></table>';
}
function updateCalc(){
  if(!_calcInited)return;
  var tbl=STD[_calcGender];
  var acad=parseFloat(document.getElementById('calc-acad').value)||0;
  var strV=parseFloat(document.getElementById('calc-str').value);
  var medV=parseFloat(document.getElementById('calc-med').value);
  var jumpV=parseFloat(document.getElementById('calc-jump').value);
  var runV=parseFloat(document.getElementById('calc-run').value);
  var strSc=isNaN(strV)?null:getScore(tbl.strength,strV);
  var medSc=isNaN(medV)?null:getScore(tbl.medicine,medV);
  var jumpSc=isNaN(jumpV)?null:getScore(tbl.jump,jumpV);
  var runSc=isNaN(runV)?null:getScore(tbl.run,runV);
  var e;
  e=document.getElementById('calc-str-sc');if(e)e.textContent=strSc!==null?strSc+'점':'';
  e=document.getElementById('calc-med-sc');if(e)e.textContent=medSc!==null?medSc+'점':'';
  e=document.getElementById('calc-jump-sc');if(e)e.textContent=jumpSc!==null?jumpSc+'점':'';
  e=document.getElementById('calc-run-sc');if(e)e.textContent=runSc!==null?runSc+'점':'';
  var all=[strSc,medSc,jumpSc,runSc];
  var filled=all.filter(function(v){return v!==null;});
  var totalEl=document.getElementById('calc-total'),detailEl=document.getElementById('calc-detail');
  if(!totalEl||!detailEl)return;
  if(filled.length===4){
    var sum=filled.reduce(function(a,b){return a+b;},0);
    var total=Math.round((acad+sum*1.75)*100)/100;
    totalEl.textContent=total.toFixed(2)+'점';
    detailEl.innerHTML='내신 '+acad.toFixed(2)+' + ('+strSc+'+'+medSc+'+'+jumpSc+'+'+runSc+') × 1.75 = <strong>'+total.toFixed(2)+'</strong>';
  }else{
    totalEl.textContent=filled.length>0?'입력 '+filled.length+'/4':'—';
    detailEl.textContent='모든 종목을 입력하면 총점이 계산됩니다';
  }
}
function resetCalc(){['calc-str','calc-med','calc-jump','calc-run'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});updateCalc();}

/* ── 영상 탭 ── */
function getFavKey(name){return'fav_gachon_'+name;}
function getFavs(name){try{return JSON.parse(localStorage.getItem(getFavKey(name))||'[]');}catch(e){return[];}}
function saveFavs(name,favs){localStorage.setItem(getFavKey(name),JSON.stringify(favs));}
function toggleFav(name,date,type){
  var favs=getFavs(name);var id=date+'__'+type;
  var idx=favs.indexOf(id);if(idx===-1)favs.push(id);else favs.splice(idx,1);
  saveFavs(name,favs);return idx===-1;
}
function renderFavSection(name,videos,container){
  var favs=getFavs(name);
  var favVids=videos.filter(function(v){return favs.indexOf(v.date+'__'+v.type)!==-1;});
  container.innerHTML='';
  var sec=document.createElement('div');sec.className='fav-section';
  if(favVids.length){
    sec.innerHTML='<div class="fav-title">❤️ 즐겨찾기 ('+favVids.length+'개)</div>';
    favVids.forEach(function(v){
      var d=document.createElement('div');d.className='fav-mini-item';
      d.textContent='📅 '+v.date+' · '+v.type;sec.appendChild(d);
    });
  }else{
    sec.innerHTML='<div class="fav-title">❤️ 즐겨찾기</div><div class="fav-empty">하트를 눌러 최고 영상을 저장해보세요!</div>';
  }
  container.appendChild(sec);
}
function renderVideoTab(videos,name,el){
  el.innerHTML='';
  var favContainer=document.createElement('div');
  el.appendChild(favContainer);
  renderFavSection(name,videos,favContainer);
  if(!videos.length){
    var empty=document.createElement('div');empty.className='video-empty';
    empty.innerHTML='📹 아직 등록된 영상이 없어요<br><small style="color:var(--sub);margin-top:6px;display:block;">실기영상 시트에 링크를 추가해주세요</small>';
    el.appendChild(empty);return;
  }
  var tl=document.createElement('div');tl.className='video-timeline';
  videos.forEach(function(v){
    var vInfo=getVideoType(v.url);
    var favs=getFavs(name);
    var isFav=favs.indexOf(v.date+'__'+v.type)!==-1;
    var item=document.createElement('div');
    item.className='video-item'+(isOfficial(v.type)?' official':'');
    var safeDate=v.date.replace(/'/g,"\\'");
    var safeType=v.type.replace(/'/g,"\\'");
    var safeName=name.replace(/'/g,"\\'");
    var safeUrl=v.url.replace(/"/g,'&quot;');
    var mediaHtml='';
    if(vInfo&&vInfo.type==='youtube'){
      var thumbUrl=getYtThumb(vInfo.id);
      mediaHtml=
        '<div class="video-thumb-wrap" onclick="window.open(\''+safeUrl+'\',\'_blank\')">'+
        '<img src="'+thumbUrl+'" alt="썸네일" onerror="this.style.display=\'none\'">'+
        '<div class="video-thumb-overlay">'+
        '<div class="video-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>'+
        '<span class="video-open-label">탭하여 YouTube에서 재생</span>'+
        '</div></div>';
    }else if(vInfo&&vInfo.type==='drive'){
      var driveViewUrl='https://drive.google.com/file/d/'+vInfo.id+'/view';
      mediaHtml=
        '<div class="video-portrait-wrap" onclick="window.open(\''+driveViewUrl+'\',\'_blank\')">'+
        '<div class="video-portrait-side"></div>'+
        '<div class="video-portrait-inner">'+
        '<div class="video-portrait-overlay">'+
        '<div class="video-play-btn" style="width:56px;height:56px;margin-bottom:10px;">'+
        '<svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:#003B7A;margin-left:4px;"><path d="M8 5v14l11-7z"/></svg>'+
        '</div>'+
        '<span style="color:#fff;font-size:.8rem;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.6);">탭하여 원본 화질로 재생</span>'+
        '<span style="color:rgba(255,255,255,.65);font-size:.7rem;margin-top:4px;">Google Drive에서 열기</span>'+
        '</div></div>'+
        '<div class="video-portrait-side"></div>'+
        '</div>';
    }else{
      mediaHtml=
        '<div class="video-drive-thumb" onclick="window.open(\''+safeUrl+'\',\'_blank\')">'+
        '<div class="video-drive-icon">🎬</div>'+
        '<div class="video-drive-label">영상 보기</div>'+
        '<div class="video-drive-sub">탭하여 재생</div>'+
        '</div>';
    }
    item.innerHTML=
      '<div class="video-card">'+
      '<div class="video-meta">'+
      '<span class="video-date-badge">📅 '+v.date+'</span>'+
      '<span class="video-type-badge">'+(isOfficial(v.type)?'🏆 ':'')+v.type+'</span>'+
      '<span class="video-heart" onclick="handleHeart(\''+safeName+'\',\''+safeDate+'\',\''+safeType+'\',this,event)">'+(isFav?'❤️':'🤍')+'</span>'+
      '</div>'+
      (isFav?'<div class="video-fav-label">❤️ 즐겨찾기 영상</div>':'')+
      mediaHtml+
      '</div>';
    tl.appendChild(item);
  });
  el.appendChild(tl);
}
function handleHeart(name,date,type,heartEl,e){
  if(e)e.stopPropagation();
  var added=toggleFav(name,date,type);
  heartEl.textContent=added?'❤️':'🤍';
  var item=heartEl.closest('.video-item');
  if(item){
    var existing=item.querySelector('.video-fav-label');
    if(added&&!existing){
      var lbl=document.createElement('div');lbl.className='video-fav-label';lbl.textContent='❤️ 즐겨찾기 영상';
      var after=item.querySelector('.video-thumb-wrap,.video-portrait-wrap,.video-drive-thumb');
      if(after)item.querySelector('.video-card').insertBefore(lbl,after);
    }else if(!added&&existing)existing.remove();
  }
  var videoContent=document.getElementById('content-video');
  if(videoContent){var fc=videoContent.firstChild;if(fc)renderFavSection(name,window._VIDEOS||[],fc);}
}

/* ── Tab 전환 ── */
function showTab(tab){
  ['chart','table','calc','video'].forEach(function(t){
    var c=document.getElementById('content-'+t);
    var b=document.getElementById('tab-'+t);
    if(c)c.style.display=tab===t?'':'none';
    if(b)b.classList.toggle('active',tab===t);
  });
}

/* ── 메인 ── */
(async function(){
  var app=document.getElementById('app');
  var name=new URLSearchParams(location.search).get('name')||'';
  if(!name){app.innerHTML='<div class="error">❌ URL에 ?name=학생이름 을 추가해주세요.</div>';return;}
  try{
    var res=await fetch(CSV_URL);if(!res.ok)throw new Error('HTTP '+res.status);
    var text=await res.text();
    var rows=parseCSV(text);
    var records=parseStudent(name,rows);
    if(!records.length){app.innerHTML='<div class="error">❌ "'+name+'" 학생 데이터를 찾을 수 없습니다.</div>';return;}
    window._RECORDS=records;
    var videos=[];
    try{
      var vres=await fetch(VIDEO_URL);
      if(vres.ok){var vt=await vres.text();videos=parseVideos(name,'가천대학교',parseCSV(vt));}
    }catch(ve){console.warn('영상 로드 실패:',ve);}
    window._VIDEOS=videos;
    var heroEl=document.createElement('div');
    var offEl=document.createElement('div');
    var tabWrap=document.createElement('div');tabWrap.className='tabs';
    tabWrap.innerHTML=
      '<button class="tab-btn active" id="tab-chart" onclick="showTab(\'chart\')">📈 차트</button>'+
      '<button class="tab-btn" id="tab-table" onclick="showTab(\'table\')">📋 기록표</button>'+
      '<button class="tab-btn" id="tab-calc" onclick="showTab(\'calc\')">🧮 계산기</button>'+
      '<button class="tab-btn" id="tab-video" onclick="showTab(\'video\')">🎬 영상</button>';
    var chartEl=document.createElement('div');chartEl.id='content-chart';chartEl.className='content-area';
    var tableEl=document.createElement('div');tableEl.id='content-table';tableEl.className='content-area';tableEl.style.display='none';
    var calcEl=document.createElement('div');calcEl.id='content-calc';calcEl.className='content-area';calcEl.style.display='none';
    var videoEl=document.createElement('div');videoEl.id='content-video';videoEl.className='content-area';videoEl.style.display='none';
    renderHero(records,heroEl);
    renderOfficialCard(records,offEl);
    renderChartTab(records,chartEl);
    renderTableTab(records,tableEl);
    renderCalcTab(records,calcEl);
    renderVideoTab(videos,name,videoEl);
    app.innerHTML='';
    [heroEl,offEl,tabWrap,chartEl,tableEl,calcEl,videoEl].forEach(function(e){app.appendChild(e);});
  }catch(err){app.innerHTML='<div class="error">❌ 로드 실패: '+err.message+'</div>';}
})();
</script>
